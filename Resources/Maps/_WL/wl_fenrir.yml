      content: >2-
          Я наблюдаю за погодой на планете уже... день тридцатый, получается? Ну и бредовое же занятие, правда?
          Вообще-то похолодало на три градуса. Не скажу, что это прямо плохо, но как будто рядом с таким количеством лавы это кажется феноменальным событием.
          На самом деле на планете уже месяц не наблюдаются резкие перепады температур. Скорее всего в отчёте так и напишем: "Объект тра-ля-ля пригоден к использованию". Название ему так и не дали.
          На другой стороне объекта сидят идиоты, что у меня уже пятнадцатый день стенку восстановить не могут. Пришлось импровизировать. Как будто я один тут нормально работаю.
